<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Privacy Blurrer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
            text-align: center;
        }
        
        .description {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-area i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
            display: block;
        }
        
        .upload-area p {
            color: #666;
            margin-bottom: 10px;
        }
        
        .file-info {
            margin-top: 15px;
            color: #764ba2;
            font-weight: 500;
        }
        
        #file-input {
            display: none;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            margin-bottom: 20px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .preview-container {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 30px;
        }
        
        .preview-title {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #f5f5f5;
        }
        
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .preview-item .remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4444;
            font-weight: bold;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .loader.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        
        .alert.success {
            background: #e8f5e8;
            color: #2e7d32;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Image Privacy Blurrer</h1>
        <p class="description">Upload images and automatically blur emails, phone numbers, and URLs</p>
        
        <div class="alert" id="alert"></div>
        
        <form id="upload-form" enctype="multipart/form-data">
            <div class="upload-area" id="upload-area">
                <i>📁</i>
                <p>Drag & drop images here or click to select</p>
                <p style="font-size: 14px;">Supports: JPG, PNG, GIF, BMP</p>
                <div class="file-info" id="file-info"></div>
            </div>
            
            <input type="file" id="file-input" name="images" multiple accept="image/*" hidden>
            
            <div class="preview-container" id="preview-container" style="display: none;">
                <h3 class="preview-title">Selected Images</h3>
                <div class="preview-grid" id="preview-grid"></div>
            </div>
            
            <button type="submit" class="button" id="submit-btn">Process Images</button>
        </form>
        
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Processing images... This may take a moment.</p>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const previewContainer = document.getElementById('preview-container');
        const previewGrid = document.getElementById('preview-grid');
        const submitBtn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const alert = document.getElementById('alert');
        const form = document.getElementById('upload-form');
        
        let selectedFiles = [];
        
        // Handle click on upload area
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        // Handle drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#764ba2';
            uploadArea.style.background = '#f0f2ff';
        });
        
        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            uploadArea.style.background = '#f8f9ff';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            uploadArea.style.background = '#f8f9ff';
            
            const files = Array.from(e.dataTransfer.files);
            handleFiles(files);
        });
        
        // Handle file input change
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            handleFiles(files);
        });
        
        function handleFiles(files) {
            // Filter only image files
            const imageFiles = files.filter(file => file.type.startsWith('image/'));
            
            if (imageFiles.length === 0) {
                showAlert('Please select valid image files', 'error');
                return;
            }
            
            selectedFiles = [...selectedFiles, ...imageFiles];
            updateFileInfo();
            updatePreview();
        }
        
        function updateFileInfo() {
            if (selectedFiles.length > 0) {
                fileInfo.textContent = `${selectedFiles.length} file(s) selected`;
                previewContainer.style.display = 'block';
            } else {
                fileInfo.textContent = '';
                previewContainer.style.display = 'none';
            }
        }
        
        function updatePreview() {
            previewGrid.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    const previewItem = document.createElement('div');
                    previewItem.className = 'preview-item';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove';
                    removeBtn.innerHTML = '×';
                    removeBtn.onclick = () => removeFile(index);
                    
                    previewItem.appendChild(img);
                    previewItem.appendChild(removeBtn);
                    previewGrid.appendChild(previewItem);
                };
                
                reader.readAsDataURL(file);
            });
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileInfo();
            updatePreview();
        }
        
        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert ${type}`;
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
        
        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (selectedFiles.length === 0) {
                showAlert('Please select at least one image', 'error');
                return;
            }
            
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('images', file);
            });
            
            // Show loader, disable button
            loader.classList.add('active');
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error('Upload failed');
                }
                
                // Download the zip file
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'blurred_images.zip';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
                
                showAlert('Images processed successfully!', 'success');
                
                // Clear selected files
                selectedFiles = [];
                updateFileInfo();
                updatePreview();
                fileInput.value = '';
                
            } catch (error) {
                showAlert('Error processing images: ' + error.message, 'error');
            } finally {
                loader.classList.remove('active');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
